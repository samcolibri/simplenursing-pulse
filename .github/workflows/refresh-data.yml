name: Refresh dashboard data (hourly)

on:
  schedule:
    - cron: '5 * * * *'   # 5 minutes past every hour, UTC
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write          # needed to dispatch deploy workflow

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch live data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
        run: node scripts/fetch-data.mjs

      - name: Commit refreshed JSON
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): hourly refresh — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY"
