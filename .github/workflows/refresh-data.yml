name: Refresh dashboard data (weekly)

# Weekly cadence: every Monday at 12:00 UTC.
# Apify (TikTok + Instagram scraping) is the paid line item — running weekly
# keeps spend predictable. Pinterest and YouTube are free but ride the same
# cadence so every section of the dashboard reflects the same point-in-time
# snapshot. Trigger a manual refresh via `gh workflow run refresh-data.yml`
# or the GitHub Actions UI if you need an off-cycle update.
on:
  schedule:
    - cron: '0 12 * * 1'   # Mondays at 12:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write          # needed to dispatch deploy workflow

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch live data
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
        run: node scripts/fetch-data.mjs

      - name: Commit refreshed JSON
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): weekly refresh — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY"
